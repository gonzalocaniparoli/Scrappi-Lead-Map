<!DOCTYPE html>
<html>
<head>
  <title>scRappi BI - Hunting Argentina</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    /* ── DISEÑO BASE ── */
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Inter', sans-serif; overflow: hidden; }
    #map { height: 100vh; width: 100%; background: #f0f2f5; }

    .brand-watermark {
      position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
      z-index: 1000; background: rgba(255,255,255,0.9); padding: 4px 12px;
      border-radius: 20px; border: 1px solid #ff4d4d; font-size: 9px;
      color: #ff4d4d; font-weight: bold; pointer-events: none;
      text-transform: uppercase; letter-spacing: 1px;
    }

    /* ── BUSCADOR ── */
    .search-container { position: fixed; top: 10px; left: 50px; z-index: 1000; display: flex; gap: 5px; }
    .search-input { padding: 8px 12px; border-radius: 8px; border: 1px solid #ccc; width: 240px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); outline: none; font-size: 13px; font-family: 'Inter', sans-serif; }
    .search-btn { background: #ff4d4d; color: white; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }

    /* ── BOTÓN UBICACIÓN ── */
    .locate-btn {
      background: #fff; width: 34px; height: 34px; border-radius: 4px;
      cursor: pointer; box-shadow: 0 1px 5px rgba(0,0,0,0.4);
      font-size: 16px; display: flex; align-items: center; justify-content: center;
      border: none; color: #ff4d4d; margin-bottom: 6px;
    }

    /* ── POPUP CARDS ── */
    .popup-card { min-width: 190px; padding: 4px; }
    .popup-title { font-weight: 700; font-size: 13px; color: #1a1a1a; margin-bottom: 5px; display: block; }
    .btn-whatsapp { display: block; width: 100%; margin-top: 8px; padding: 8px; background: #25D366; color: white !important; text-align: center; text-decoration: none; border-radius: 6px; font-weight: 700; font-size: 11px; }
    .btn-visited { display: block; width: 100%; margin-top: 6px; padding: 8px; border-radius: 6px; cursor: pointer; font-weight: 800; font-size: 11px; border: 1px solid #111; background: #fff; color: #111; transition: 0.2s; }
    .btn-visited.is-visited { background: #111; color: #fff; }

    /* ── PANELES ── */
    #filterPanel, #statsPanel { position: fixed; right: 10px; z-index: 1000; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.12); border: 1px solid #eee; font-size: 11px; }
    #filterPanel { top: 10px; width: 185px; }
    #statsPanel { bottom: 30px; padding: 10px 12px; min-width: 158px; line-height: 1.6; }
    
    #filterHeader { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; cursor: pointer; background: none; border: none; width: 100%; font-weight: 700; color: #ff4d4d; font-family: 'Inter', sans-serif; }
    #filterBody { padding: 0 12px 12px; }
    #filterBody.hidden { display: none; }
    #filterBody label { display: block; font-weight: 600; margin: 8px 0 3px; color: #333; }
    #filterBody select { width: 100%; padding: 5px; border-radius: 6px; border: 1px solid #ddd; outline: none; cursor: pointer; font-family: 'Inter', sans-serif; }

    .platform-ring { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 6px; border: 2px solid; vertical-align: middle; }
    .count-badge { float: right; background: #f1f5f9; padding: 0 6px; border-radius: 10px; font-weight: 700; color: #475569; }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .search-container { left: 10px; right: 10px; }
      #filterPanel { top: auto; bottom: 90px; left: 8px; width: 150px; }
      #statsPanel { bottom: 26px; right: 8px; min-width: 130px; }
    }
  </style>
</head>
<body>

  <div class="search-container">
    <input type="text" id="addressInput" class="search-input" placeholder="Nombre o dirección...">
    <button id="btnManualSearch" class="search-btn">🔍</button>
  </div>

  <div id="filterPanel">
    <button id="filterHeader" onclick="toggleFilters()">
      <span>🏢 Filtros</span>
      <span id="filterArrow">▼</span>
    </button>
    <div id="filterBody" class="hidden">
      <label>Plataforma</label>
      <select id="platFilter">
        <option value="all">Todas</option>
        <option value="peya">PedidosYa</option>
        <option value="uber">Uber Eats</option>
        <option value="didi">DiDi Food</option>
        <option value="ifood">iFood</option>
      </select>

      <label>🍕 Rubro</label>
      <select id="catFilter">
        <option value="all">Todos</option>
      </select>

      <label>🚦 Rating (Excluyente)</label>
      <select id="rateFilter">
        <option value="all">Todos</option>
        <option value="ideal">Excelente (+4.5 ⭐)</option>
        <option value="promedio">Bueno (4.0 - 4.5 ⭐)</option>
        <option value="regular">Regular (-4.0 ⭐)</option>
      </select>
      
      <label>👁️ Estado de Visita</label>
      <select id="visitedFilter">
        <option value="all">Ver Todos</option>
        <option value="pending">Solo Pendientes</option>
        <option value="visited">Solo Vistos</option>
      </select>
    </div>
  </div>

  <div id="statsPanel">
    <b>📊 Market Share (<span id="count-total">0</span>)</b>
    <div><span class="platform-ring" style="border-color:#000"></span>Uber Eats <span class="count-badge" id="count-uber">0</span></div>
    <div><span class="platform-ring" style="border-color:#FF8D00"></span>DiDi Food <span class="count-badge" id="count-didi">0</span></div>
    <div><span class="platform-ring" style="border-color:#E0004D"></span>PedidosYa <span class="count-badge" id="count-peya">0</span></div>
    <div><span class="platform-ring" style="border-color:#EA1D2C"></span>iFood <span class="count-badge" id="count-ifood">0</span></div>
  </div>

  <div id="map"></div>
  <div class="brand-watermark">HUNTING ARGENTINA - Intelligence Suite</div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="mapa_leads.js"></script>

  <script>
    // 1. INICIALIZACIÓN DEL MAPA
    const map = L.map('map', { zoomControl: false }).setView([0, 0], 2);
    L.control.zoom({ position: 'bottomleft' }).addTo(map);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

    const markersLayer = L.layerGroup().addTo(map);
    const userLocationLayer = L.layerGroup().addTo(map);
    const VISITED_KEY = "scrappi_visited_v1";

    // 2. CONTROL DE UBICACIÓN
    const locateControl = L.control({ position: 'bottomleft' });
    locateControl.onAdd = function() {
      const div = L.DomUtil.create('div', 'locate-btn');
      div.innerHTML = '📍';
      div.title = 'Mi ubicación';
      div.onclick = (e) => {
        e.stopPropagation();
        map.locate({ setView: true, maxZoom: 15 });
      };
      return div;
    };
    locateControl.addTo(map);

    map.on('locationfound', e => {
      userLocationLayer.clearLayers();
      L.circle(e.latlng, { radius: e.accuracy, color: '#ff4d4d', fillColor: '#ff4d4d', fillOpacity: 0.15 }).addTo(userLocationLayer);
      L.marker(e.latlng).addTo(userLocationLayer).bindPopup("Estás aquí").openPopup();
    });

    // 3. PERSISTENCIA DE "VISTOS" (LocalStorage)
    function getVisitedData() {
      return JSON.parse(localStorage.getItem(VISITED_KEY) || "{}");
    }

    function toggleVisited(leadId) {
      const data = getVisitedData();
      data[leadId] = !data[leadId];
      localStorage.setItem(VISITED_KEY, JSON.stringify(data));
      // Re-renderizamos para que cambie el color del punto y el botón del popup inmediatamente
      render(false); 
    }

    function makeLeadId(shop) {
      // ID único basado en nombre y dirección
      return btoa(`${shop.NAME}-${shop.ADDRESS}`).substring(0, 32);
    }

    // 4. LÓGICA DE PLATAFORMAS
    function getPlatInfo(url) {
      const u = (url || "").toLowerCase();
      if (u.includes('pedidosya')) return { id: 'peya', name: 'PedidosYa', color: '#E0004D' };
      if (u.includes('ubereats') || u.includes('uber')) return { id: 'uber', name: 'Uber Eats', color: '#000000' };
      if (u.includes('didiglobal') || u.includes('didi')) return { id: 'didi', name: 'DiDi Food', color: '#FF8D00' };
      if (u.includes('ifood')) return { id: 'ifood', name: 'iFood', color: '#EA1D2C' };
      return { id: 'other', name: 'Otros', color: '#757575' };
    }

    // 5. FUNCIÓN RENDER PRINCIPAL
    function render(shouldFitBounds = true) {
      markersLayer.clearLayers();
      const visitedData = getVisitedData();
      
      const filters = {
        plat: document.getElementById('platFilter').value,
        cat: document.getElementById('catFilter').value,
        rateType: document.getElementById('rateFilter').value,
        view: document.getElementById('visitedFilter').value
      };

      let counts = { peya: 0, uber: 0, didi: 0, ifood: 0, total: 0 };
      let bounds = [];

      window.SCRAPED_LEADS.forEach(shop => {
        const plat = getPlatInfo(shop.URL);
        const rating = parseFloat(shop.RATING || 0);
        const leadId = makeLeadId(shop);
        const isVisited = !!visitedData[leadId];

        // --- FILTROS ---
        if (filters.plat !== 'all' && filters.plat !== plat.id) return;
        if (filters.cat !== 'all' && !shop.CATEGORIES.toString().includes(filters.cat)) return;
        
        // Rating Excluyente
        if (filters.rateType !== 'all') {
          if (filters.rateType === 'ideal' && rating < 4.5) return;
          if (filters.rateType === 'promedio' && (rating < 4.0 || rating >= 4.5)) return;
          if (filters.rateType === 'regular' && rating >= 4.0) return;
        }

        // Estado de Visita
        if (filters.view === 'pending' && isVisited) return;
        if (filters.view === 'visited' && !isVisited) return;

        // --- PROCESAMIENTO ---
        if (counts[plat.id] !== undefined) counts[plat.id]++;
        counts.total++;
        bounds.push([shop.LAT, shop.LNG]);

        const colorSemaforo = rating >= 4.5 ? '#22c55e' : rating >= 4.0 ? '#eab308' : '#ef4444';
        
        const marker = L.circleMarker([shop.LAT, shop.LNG], {
          radius: isVisited ? 6 : 9,
          fillColor: isVisited ? "#9ca3af" : colorSemaforo,
          color: isVisited ? "#6b7280" : plat.color,
          weight: 3,
          fillOpacity: isVisited ? 0.3 : 0.8,
          opacity: isVisited ? 0.4 : 1
        });

        const phone = (shop.PHONE || "").replace(/\D/g, '');
        const companyLine = (shop.COMPANYNAME && shop.COMPANYNAME !== '-')
          ? `<div style="font-size:10px;color:#888;margin-bottom:3px;">🏢 ${shop.COMPANYNAME}</div>` : '';
        const platBtnColor = plat.id === 'uber' ? '#000' : plat.id === 'didi' ? '#FF8D00' : plat.id === 'ifood' ? '#EA1D2C' : '#E0004D';
        const storeBtn = shop.URL && shop.URL.startsWith('http')
          ? `<a href="${shop.URL}" target="_blank" style="display:block;width:100%;margin-top:5px;padding:8px;background:${platBtnColor};color:white;text-align:center;text-decoration:none;border-radius:6px;font-weight:700;font-size:11px;">🛒 Ver en ${plat.name}</a>` : '';

        const popupHtml = `
          <div class="popup-card">
            <span class="popup-title">${shop.NAME}</span>
            ${companyLine}
            <div style="font-size:10px; color:#666; margin-bottom:5px;">📍 ${shop.ADDRESS}</div>
            <div style="font-weight:bold; margin-bottom:8px;">⭐ ${rating} | <span style="color:${plat.color}">${plat.name}</span></div>
            ${phone ? `<a href="https://wa.me/${phone}" target="_blank" class="btn-whatsapp">💬 WhatsApp</a>` : ''}
            ${storeBtn}
            <button class="btn-visited ${isVisited ? 'is-visited' : ''}" onclick="toggleVisited('${leadId}')">
              ${isVisited ? '✅ VISITADO (desmarcar)' : '❌ MARCAR COMO VISTO'}
            </button>
          </div>
        `;

        marker.bindPopup(popupHtml);
        marker.addTo(markersLayer);
      });

      // Actualizar Contadores
      document.getElementById('count-total').innerText = counts.total;
      document.getElementById('count-peya').innerText = counts.peya;
      document.getElementById('count-uber').innerText = counts.uber;
      document.getElementById('count-didi').innerText = counts.didi;
      document.getElementById('count-ifood').innerText = counts.ifood;

      // AUTO-ZOOM (Solo si se cambia un filtro, no al marcar como visto)
      if (shouldFitBounds && bounds.length > 0) {
        map.fitBounds(bounds, { padding: [50, 50], maxZoom: 15 });
      }
    }

    // 6. UTILIDADES DE INTERFAZ
    function populateCategories() {
      const cats = new Set();
      window.SCRAPED_LEADS.forEach(s => {
        if (s.CATEGORIES) s.CATEGORIES.toString().split(',').forEach(c => cats.add(c.trim()));
      });
      const sel = document.getElementById('catFilter');
      Array.from(cats).sort().forEach(c => {
        if(!c) return;
        const opt = document.createElement('option');
        opt.value = c; opt.textContent = c;
        sel.appendChild(opt);
      });
    }

    function toggleFilters() {
      const body = document.getElementById('filterBody');
      body.classList.toggle('hidden');
      document.getElementById('filterArrow').textContent = body.classList.contains('hidden') ? '▼' : '▲';
    }

    // Listeners
    ['platFilter', 'catFilter', 'rateFilter', 'visitedFilter'].forEach(id => {
      document.getElementById(id).addEventListener('change', () => render(true));
    });

    document.getElementById('btnManualSearch').onclick = doSearch;
    document.getElementById('addressInput').onkeydown = (e) => { if(e.key === 'Enter') doSearch(); };

    function doSearch() {
      const val = document.getElementById('addressInput').value.toLowerCase();
      const found = window.SCRAPED_LEADS.find(s => s.NAME.toLowerCase().includes(val) || s.ADDRESS.toLowerCase().includes(val));
      if (found) {
        map.setView([found.LAT, found.LNG], 17);
      } else {
        alert("No se encontró el local en la base de datos.");
      }
    }

    // Inicio
    populateCategories();
    render(true);
  </script>
</body>
</html>
